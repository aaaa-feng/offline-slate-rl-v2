# Beta High Ablation (复现 exp_beta_high_ablation_20260518)
# beta: 8 / 10, 环境: mix_divpen + topdown_divpen

experiment_name: beta_high_ablation
seed: 58407201

env_name: mix_divpen                # CLI --env_name 覆盖
dataset_quality: b5

ranker_type: gems
gems_embedding_mode: ideal_init

algo: iql
beta: 8
expectile: 0.8
lambda_bc: 0.0
gamma: 0.99
iql_tau: 0.005
reward_scale: 10.0
label_click_mode: fake_zero
best_checkpoint_metric: iqm

max_timesteps: 100000               # 旧实验用 100k（诊断性短跑）
batch_size: 256
eval_freq: 500
log_freq: 500
save_freq: 50000
eval_episodes: 50
final_eval_episodes: 100

hidden_dim: 256
n_hidden: 2
actor_lr: 0.0003
critic_lr: 0.0003
value_lr: 0.0003

belief_hidden_dim: 20
item_embedd_dim: 20
num_items: 1000
rec_size: 10
gru_mode: qv_shared_detach

actor_type: gaussian

use_swanlab: true
swan_project: Offline_Slate_RL_202606
swan_workspace: Cliff
swan_mode: cloud
