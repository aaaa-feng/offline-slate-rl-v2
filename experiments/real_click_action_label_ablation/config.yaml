# Real Click Action Label Ablation
#
# Same as early10k_validation except experiment paths and label_click_mode=real.

experiment_name: real_click_action_label_ablation
seed: 58407201

env_name: mix_divpen
dataset_quality: b5

ranker_type: gems
gems_embedding_mode: ideal_init
latent_dim: 32
lambda_KL: 0.01
lambda_click: 1.0

algo: iql
beta: 8.0
expectile: 0.8
lambda_bc: 0.0
gamma: 0.99
iql_tau: 0.005
reward_scale: 10.0
label_click_mode: real
best_checkpoint_metric: iqm

max_timesteps: 10000
batch_size: 256
eval_freq: 100
log_freq: 100
save_freq: 50000
eval_episodes: 50
final_eval_episodes: 100

dual_eval: true
eval_timeline_dir: experiments/real_click_action_label_ablation/eval_timeline

hidden_dim: 256
n_hidden: 2
actor_lr: 0.0003
critic_lr: 0.0003
value_lr: 0.0003

belief_hidden_dim: 20
item_embedd_dim: 20
num_items: 1000
rec_size: 10
gru_mode: qv_shared_detach

actor_type: gaussian

enable_train_geometry_probe: true
geometry_probe_episodes: 10
geometry_probe_dataset_samples: 20000
geometry_probe_save_samples: false
geometry_probe_dir: experiments/real_click_action_label_ablation/probe_outputs

use_swanlab: true
swan_project: Early10K_Validation_202606
swan_workspace: Cliff
swan_mode: cloud
