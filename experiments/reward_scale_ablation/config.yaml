# reward_scale ablation: Q/V 尺度对 Advantage 信号生命周期的因果测试
# beta=8, mix_divpen, ideal_init GeMS, lambda_bc=0.0

experiment_name: reward_scale_ablation
seed: 58407201

env_name: mix_divpen
dataset_quality: b5

ranker_type: gems
gems_embedding_mode: ideal_init

algo: iql
beta: 8                              # beta that shows clearest early peak
expectile: 0.8
lambda_bc: 0.0
gamma: 0.99
iql_tau: 0.005
reward_scale: 10                     # CLI --reward_scale 覆盖: 1/5/10/20/50
label_click_mode: fake_zero
best_checkpoint_metric: iqm

max_timesteps: 100000
batch_size: 256
eval_freq: 500
log_freq: 500
save_freq: 50000
eval_episodes: 50
final_eval_episodes: 100

hidden_dim: 256
n_hidden: 2
actor_lr: 0.0003
critic_lr: 0.0003
value_lr: 0.0003

belief_hidden_dim: 20
item_embedd_dim: 20
num_items: 1000
rec_size: 10
gru_mode: qv_shared_detach

actor_type: gaussian

use_swanlab: true
swan_project: Offline_Slate_RL_202606
swan_workspace: Cliff
swan_mode: cloud
