# beta_ablation_repreduce: 复现旧项目 beta ablation (0/1/2/5/8/10) × (mix/topdown)，验证新项目完全对齐
# 回答导师三个问题：
#   Q1: 窄动作空间如何导致测试变差？
#   Q2: Advantage 消失的原因？与窄空间直接相关吗？
#   Q3: 不改动作空间，只保 Advantage 能否解决？
#
# 矩阵: 2 env × 6 beta = 12 runs
#   env: mix_divpen, topdown_divpen
#   beta: 0 (BC基线), 1, 2, 5, 8, 10

experiment_name: beta_ablation_repreduce    # run.sh 会覆盖为 beta_ablation_repreduce/{env}_{beta}
seed: 58407201

env_name: mix_divpen              # CLI --env_name 覆盖
dataset_quality: b5

ranker_type: gems
gems_embedding_mode: ideal_init   # 与旧实验一致

algo: iql
beta: 3.0                         # CLI --beta 覆盖: 0/1/2/5/8/10
expectile: 0.8
lambda_bc: 0.0                    # 与旧实验一致（验证墙2）
gamma: 0.99
iql_tau: 0.005
reward_scale: 10.0
label_click_mode: fake_zero
best_checkpoint_metric: iqm

max_timesteps: 100000             # 100k: 覆盖上升(11k)→崩塌(20k)→终态
batch_size: 256
eval_freq: 500
log_freq: 500
save_freq: 50000
eval_episodes: 50
final_eval_episodes: 100

hidden_dim: 256
n_hidden: 2
actor_lr: 0.0003
critic_lr: 0.0003
value_lr: 0.0003

belief_hidden_dim: 20
item_embedd_dim: 20
num_items: 1000
rec_size: 10
gru_mode: qv_shared_detach

actor_type: gaussian

use_swanlab: true
swan_project: Offline_Slate_RL_202606
swan_workspace: Cliff
swan_mode: cloud
