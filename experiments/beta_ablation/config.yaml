# Beta Ablation Experiment (复现 exp_beta_ablation_20260420)
# beta: 0 / 1 / 2 / 5
# 环境: mix_divpen, b5
# GeMS: ideal_init (env-init ckpt, 与旧实验一致)

experiment_name: beta_ablation
seed: 58407201

env_name: mix_divpen
dataset_quality: b5

ranker_type: gems
gems_embedding_mode: ideal_init    # 旧实验用 env-init GeMS ckpt

algo: iql
beta: 3.0                           # 通过 CLI --beta 覆盖: 0/1/2/5
expectile: 0.8
lambda_bc: 0.0                      # 旧实验用 0.0
gamma: 0.99
iql_tau: 0.005
reward_scale: 10.0
label_click_mode: fake_zero
best_checkpoint_metric: iqm

max_timesteps: 1000000
batch_size: 256
eval_freq: 500
log_freq: 500
save_freq: 50000
eval_episodes: 50
final_eval_episodes: 100

hidden_dim: 256
n_hidden: 2
actor_lr: 0.0003
critic_lr: 0.0003
value_lr: 0.0003

belief_hidden_dim: 20
item_embedd_dim: 20
num_items: 1000
rec_size: 10
gru_mode: qv_shared_detach

actor_type: gaussian

use_swanlab: true
swan_project: Offline_Slate_RL_202606
swan_workspace: Cliff
swan_mode: cloud
